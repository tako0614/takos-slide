name: takos-slide
version: "0.1.0"

publish:
  - name: takos-api
    publisher: takos
    type: api-key
    spec:
      scopes:
        - files:read
        - files:write
  - name: slide-oauth
    publisher: takos
    type: oauth-client
    spec:
      clientName: Takos Slide
      redirectUris:
        - /api/auth/callback
      scopes:
        - openid
        - profile
        - email
  - name: slide-ui
    publisher: web
    type: UiSurface
    path: /
    title: Slide
    spec:
      description: Takos presentation editor
      icon: /icons/slide.svg
      category: office
      sortOrder: 30
  - name: slide-mcp
    publisher: web
    type: McpServer
    path: /mcp
    title: Slide MCP
    spec:
      transport: streamable-http
      authSecretRef: MCP_AUTH_TOKEN

compute:
  web:
    icon: /icons/slide.svg
    readiness: /healthz
    env:
      MCP_AUTH_REQUIRED: "1"
      APP_AUTH_REQUIRED: "1"
    consume:
      - publication: takos-api
        env:
          endpoint: TAKOS_STORAGE_API_URL
          apiKey: TAKOS_STORAGE_ACCESS_TOKEN
      - publication: slide-oauth
        env:
          clientId: OAUTH_CLIENT_ID
          clientSecret: OAUTH_CLIENT_SECRET
          issuer: OAUTH_ISSUER_URL
          tokenEndpoint: OAUTH_TOKEN_URL
          userinfoEndpoint: OAUTH_USERINFO_URL
    build:
      fromWorkflow:
        path: .takos/workflows/deploy.yml
        job: build-web
        artifact: web
        artifactPath: dist/worker.js

resources:
  slide-session-secret:
    type: secret
    generate: true
    bind: APP_SESSION_SECRET
    to: web

routes:
  - target: web
    path: /
  - target: web
    path: /api
  - target: web
    path: /mcp
