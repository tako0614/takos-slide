apiVersion: takos.dev/v1alpha1
kind: App
metadata:
  name: takos-slide
spec:
  version: "0.1.0"
  description: Presentation editor (Google Slides alternative)
  category: app
  tags:
    - slide
    - presentation
    - editor
    - canvas

  workers:
    web:
      build:
        fromWorkflow:
          path: .takos/workflows/deploy.yml
          job: build-web
          artifact: web
          artifactPath: dist

  routes:
    - name: web
      target: web
      path: /
    - name: mcp
      target: web
      path: /mcp

  takos:
    scopes:
      - files:read
      - files:write

  env:
    required:
      - TAKOS_ACCESS_TOKEN
    inject:
      APP_URL: "{{routes.web.url}}"
      TAKOS_API_URL: "{{takos.apiUrl}}"

  mcpServers:
    - name: takos-slide
      route: mcp
      transport: streamable-http
